bundle:
  name: "dqx-studio"


variables:
  catalog_name:
    description: "Name of the catalog for DQX Studio storage"
    default: "uc_cjp_qa"
  schema_name:
    description: "Name of the schema for DQX Studio storage"
    default: "dqx_app"
  tmp_schema_name:
    description: "Name of the schema for temporary views and intermediate processing"
    default: "dqx_app_tmp"
  admin_group:
    description: "Databricks workspace group name for bootstrap Admin access"
    default: "admins"
  app_name:
    description: "Name of the deployed Databricks App (must be unique per workspace)"
    default: "dqx-app"
  sql_warehouse_name:
    description: "Name of the deployed SQL warehouse for DQX Studio queries (must be unique per workspace)"
    default: "dqx-app-sql-warehouse"
  task_runner_job_id:
    description: >
      Numeric ID of the dqx-task-runner job. Must be set per-target after
      the first deploy creates the job. Used in app.yml so the app knows
      which job to submit dry-run and profiler tasks to.
    default: ""
  sql_warehouse_id:
    description: >
      ID of the SQL warehouse the app queries. Every target MUST set
      this. Two ways to populate it; see DEPLOYMENT.md
      "Choosing a SQL warehouse mode" for the side-by-side comparison.
      
      Mode A (bundle-managed, see ``bdf-vo``): set to
      ``${resources.sql_warehouses.dqx_sql_warehouse.id}`` AND declare a
      ``sql_warehouses.dqx_sql_warehouse`` block under the target's
      ``resources:``. The bundle CREATES the warehouse; ``bundle destroy``
      DELETES it.
      
      Mode B (external / reuse, see ``kaizen-app``): set to a literal
      warehouse ID. The bundle never creates, mutates, or destroys the
      warehouse. ``post_deploy_grants.sh`` GRANTs ``CAN_USE`` to the app
      SP, job SP, and the ``users`` workspace group via the warehouses
      permissions API (the bundle doesn't own the warehouse, so
      ``databricks_permissions`` can't be used).
      
      Default is intentionally empty so a target that forgets to set it
      fails fast at deploy time rather than silently picking the wrong
      warehouse.
    default: ""
  wheels_volume_name:
    description: "Name of the UC volume for storing DQX wheel files"
    default: "wheels"
  dqx_service_principal_application_id:
    description: "Application ID of the service principal for DQX tasks"
    default: "00000000-0000-0000-0000-000000000000"
  # ------------------------------------------------------------------
  # Lakebase backend
  # ------------------------------------------------------------------
  # The app stores its OLTP state (rules catalog, app settings, RBAC,
  # comments, schedule configs, scheduler bookkeeping) in a Lakebase
  # Postgres instance for sub-millisecond reads and to avoid SQL
  # warehouse cold starts. Append-mostly observability tables
  # (dq_validation_runs, dq_profiling_results, dq_metrics,
  # dq_quarantine_records) stay in Delta — those are written by the
  # Spark task runner and consumed by AI/BI dashboards.
  #
  # The Lakebase instance is declared as a bundle resource below with
  # ``lifecycle.prevent_destroy: true``. New Lakebase instances are
  # autoscaling by default (see
  # https://docs.databricks.com/aws/en/oltp/upgrade-to-autoscaling).
  #
  # Connection target: ``databricks_postgres`` — the always-present
  # admin database every Lakebase instance ships with. We don't create
  # a per-app logical Postgres database because the only DAB resource
  # that creates one (``database_catalogs``) also creates a Unity
  # Catalog catalog and therefore requires ``CREATE CATALOG`` on the
  # metastore — a permission most app deployers don't hold. Using
  # ``databricks_postgres`` keeps the bundle fully declarative with no
  # external bootstrap steps, and we still get per-app isolation via a
  # dedicated Postgres schema (``DQX_LAKEBASE_SCHEMA_NAME`` in the app
  # config, defaults to ``dqx_studio``).
  lakebase_instance_name:
    description: "Name of the Lakebase Postgres instance for OLTP state."
    default: "dqx-studio-lakebase"
  lakebase_database_name:
    description: >
      Logical Postgres database the app connects to inside the Lakebase
      instance. Defaults to ``databricks_postgres`` (always present, no
      creation required). All DQX tables live inside a dedicated
      ``dqx_studio`` schema within this database for isolation, so
      multiple apps can safely share ``databricks_postgres`` on the
      same Lakebase instance.
    default: "databricks_postgres"
  app_lakebase_instance_name:
    description: >
      Lakebase instance name passed to the app as DQX_LAKEBASE_INSTANCE_NAME.
      Defaults to the same value as lakebase_instance_name. Set to "" to
      disable Lakebase and run all OLTP tables on Delta (useful for
      workspaces where the deployer lacks Lakebase permissions).
    default: "dqx-studio-lakebase"
  app_lakebase_database_name:
    description: >
      Lakebase database name passed to the app as DQX_LAKEBASE_DATABASE_NAME.
      Set to "" when app_lakebase_instance_name is "" (Delta fallback).
    default: "databricks_postgres"
  lakebase_capacity:
    description: "Lakebase compute capacity (CU_1, CU_2, CU_4, CU_8)"
    default: "CU_1"
  app_config:
    type: complex
    description: "Configuration for DQX Studio"
    default:
      # Multiple workers improve HTTP throughput. The in-process SchedulerService
      # is guarded by a file lock so only one worker runs the scheduler loop.
      # The in-memory CacheFactory (TTL-based, non-authoritative) warms
      # independently per worker, which is acceptable for its use case.
      command:
        - "uvicorn"
        - "databricks_labs_dqx_app.backend.app:app"
        - "--workers"
        - "1"
      env:
        - name: "DATABRICKS_WAREHOUSE_ID"
          value_from: "dqx-sql-warehouse"
        - name: "DQX_CATALOG"
          value: "${var.catalog_name}"
        - name: "DQX_SCHEMA"
          value: "${var.schema_name}"
        - name: "DQX_JOB_ID"
          value_from: "dqx-task-runner-job"
        - name: "DQX_TMP_SCHEMA"
          value: "${var.tmp_schema_name}"
        - name: "DQX_ADMIN_GROUP"
          value: "${var.admin_group}"
        - name: "DQX_WHEELS_VOLUME"
          value: "/Volumes/${var.catalog_name}/${var.schema_name}/${var.wheels_volume_name}"
        # Lakebase wiring. The instance is declared as a bundle
        # resource further down (with ``lifecycle.prevent_destroy: true``
        # so ``bundle destroy`` cannot drop it). The logical database
        # defaults to the always-present ``databricks_postgres``; the
        # app creates its ``dqx_studio`` Postgres schema inside it on
        # first connection.
        - name: "DQX_LAKEBASE_INSTANCE_NAME"
          value: "${var.lakebase_instance_name}"
        - name: "DQX_LAKEBASE_DATABASE_NAME"
          value: "${var.lakebase_database_name}"

sync:
  include:
    - .build

artifacts:
  default:
    # ``scripts/build_app.py`` builds the application wheel with a build-tag
    # local-version segment (e.g. ``.b20260530t012345``) baked into BOTH the
    # wheel filename and the internal METADATA, so pip in Databricks Apps'
    # persistent venv reinstalls fresh code on every redeploy. See
    # ``[tool.uv-dynamic-versioning]`` in pyproject.toml for the
    # ``DQX_APP_BUILD_TAG`` env var contract.
    #
    # ``scripts/build_app.py`` also writes ``.build/requirements.txt``
    # with the freshly-built app wheel; the trailing shell snippet
    # prepends the parent DQX library wheel filename so Databricks
    # Apps' pip install picks up both, in dependency order.
    build: >
      uv run python scripts/build_app.py &&
      uv build ../ --wheel --out-dir .build/ &&
      uv build tasks/ --wheel --out-dir .build/tasks/ &&
      dqx_whl=$(ls -1 .build/databricks_labs_dqx-*.whl | head -1 | xargs basename) &&
      echo "$dqx_whl" | cat - .build/requirements.txt > .build/requirements.txt.tmp &&
      mv .build/requirements.txt.tmp .build/requirements.txt &&
      python3 -c "import pathlib; lines=pathlib.Path('.build/requirements.txt').read_text().splitlines(); pathlib.Path('requirements.txt').write_text('\n'.join(f'.build/{l}' for l in lines if l.strip()) + '\n')" &&
      python3 scripts/write_app_yml.py
      DATABRICKS_WAREHOUSE_ID=${var.sql_warehouse_id}
      DQX_CATALOG=${var.catalog_name}
      DQX_SCHEMA=${var.schema_name}
      DQX_JOB_ID=${var.task_runner_job_id}
      DQX_TMP_SCHEMA=${var.tmp_schema_name}
      DQX_ADMIN_GROUP=${var.admin_group}
      DQX_WHEELS_VOLUME=/Volumes/${var.catalog_name}/${var.schema_name}/${var.wheels_volume_name}
      DQX_LAKEBASE_INSTANCE_NAME=${var.app_lakebase_instance_name}
      DQX_LAKEBASE_DATABASE_NAME=${var.app_lakebase_database_name}

resources:
  apps:
    dqx-studio:
      name: ${var.app_name}
      description: "Databricks DQX Studio for Data Quality Monitoring"
      source_code_path: ".build"
      config: ${var.app_config}

      # These scopes are NOT sufficient for all app features. After deploying,
      # enable all-apis via the account-level CLI:
      #   databricks auth login --host https://accounts.cloud.databricks.com \
      #     --account-id <dbx-account-id> --profile <profile-name>
      #   databricks account custom-app-integration update '<oauth2-app-client-id>' \
      #     --json '{"scopes": ["openid", "profile", "email", "all-apis", "offline_access", "iam.current-user"]}'
      # <oauth2-app-client-id> is in the Apps UI under User authorization,
      # or run: databricks account custom-app-integration list
      #
      # The partial list below is the DABs-managed baseline; it does NOT
      # replace the all-apis scope requirement above.
      user_api_scopes:
        - sql
        - catalog.catalogs:read
        - catalog.schemas:read
        - catalog.tables:read
        - serving.serving-endpoints


      resources:
        - name: "dqx-sql-warehouse"
          description: "SQL Warehouse for DQX Studio queries"
          sql_warehouse:
            # ``sql_warehouse_id`` is set per-target. For bundle-managed
            # warehouses (e.g. bdf-vo) the target sets it to
            # ``${resources.sql_warehouses.dqx_sql_warehouse.id}`` and
            # also declares the ``sql_warehouses.dqx_sql_warehouse``
            # block locally. For external warehouses (e.g. kaizen-app)
            # the target sets it to a literal ID and the bundle never
            # creates a warehouse for that target.
            id: ${var.sql_warehouse_id}
            permission: "CAN_USE"
        - name: "dqx-task-runner-job"
          description: "Job for async profiler and dry-run tasks"
          job:
            id: ${resources.jobs.dqx_task_runner.id}
            permission: "CAN_MANAGE"
        # Lakebase resource removed from the default resources list.
        # Targets that use Lakebase add it explicitly in their own
        # resources override (with a literal instance_name).
        # Targets that disable Lakebase (app_lakebase_instance_name: "")
        # omit it entirely — the app falls back to Delta for OLTP tables.

      permissions:
        - group_name: "account users"
          level: "CAN_USE"

  # ``sql_warehouses.dqx_sql_warehouse`` is intentionally NOT declared at
  # top-level. Targets that want a bundle-managed warehouse declare it
  # inside their own ``resources.sql_warehouses`` block (see bdf-vo).
  # Targets that point at an existing warehouse just set
  # ``sql_warehouse_id`` to the literal ID (see kaizen-app). This keeps
  # ``bundle destroy`` honest — it can't accidentally delete a shared
  # warehouse the bundle never created.

  # ------------------------------------------------------------------
  # Stateful storage (schemas, volume, Lakebase instance + database).
  #
  # Every entry below is tagged ``lifecycle.prevent_destroy: true`` so
  # that ``databricks bundle destroy`` (or a deploy that would
  # otherwise replace the resource) fails fast instead of dropping the
  # backing data. To intentionally tear something down: remove the
  # flag, ``databricks bundle deployment unbind <key>``, then destroy.
  #
  # For an existing workspace whose resources were provisioned
  # out-of-band (e.g. from the previous bootstrap script), one-time
  # binding is required before the first deploy — see ``make app-bind``
  # and DEPLOYMENT.md → "Migrating an existing workspace".
  # ------------------------------------------------------------------
  schemas:
    main_schema:
      catalog_name: ${var.catalog_name}
      name: ${var.schema_name}
      comment: "DQX Studio main schema (rules, run history, profiling, metrics, quarantine, OLTP fallback)"
      lifecycle:
        prevent_destroy: true

    tmp_schema:
      catalog_name: ${var.catalog_name}
      name: ${var.tmp_schema_name}
      comment: "DQX Studio temp schema for per-user dry-run views"

  volumes:
    wheels:
      catalog_name: ${var.catalog_name}
      schema_name: ${resources.schemas.main_schema.name}
      name: ${var.wheels_volume_name}
      volume_type: MANAGED
      comment: "DQX Studio wheel storage for the task runner"
      lifecycle:
        prevent_destroy: true

  # database_instances.lakebase removed from top-level. Targets that need
  # bundle-managed Lakebase declare it under their own resources block.
  # The app connects to Lakebase via DQX_LAKEBASE_INSTANCE_NAME (env var
  # in app.yml); set app_lakebase_instance_name: "" per-target to disable.

  jobs:
    dqx_task_runner:
      name: "dqx-studio-task-runner"
      max_concurrent_runs: 10
      tags:
        app: "dqx"
      run_as:
        service_principal_name: ${var.dqx_service_principal_application_id}
      tasks:
        - task_key: "run_task"
          python_wheel_task:
            package_name: databricks_labs_dqx_task_runner
            entry_point: dqx-task-runner
            parameters:
              - "--task_type"
              - "{{job.parameters.task_type}}"
              - "--view_fqn"
              - "{{job.parameters.view_fqn}}"
              - "--result_catalog"
              - "{{job.parameters.result_catalog}}"
              - "--result_schema"
              - "{{job.parameters.result_schema}}"
              - "--config_json"
              - "{{job.parameters.config_json}}"
              - "--run_id"
              - "{{job.parameters.run_id}}"
              - "--requesting_user"
              - "{{job.parameters.requesting_user}}"
          environment_key: "default"
      environments:
        - environment_key: "default"
          spec:
            client: "5"
            dependencies:
              - ./.build/tasks/databricks_labs_dqx_task_runner-*.whl
              - ./.build/databricks_labs_dqx-*.whl
      parameters:
        - name: "task_type"
          default: "profile"
        - name: "view_fqn"
          default: ""
        - name: "result_catalog"
          default: "${var.catalog_name}"
        - name: "result_schema"
          default: "${var.schema_name}"
        - name: "config_json"
          default: "{}"
        - name: "run_id"
          default: ""
        - name: "requesting_user"
          default: "unknown"

targets:
  # Template for adding a new target. Required variables are:
  #   - ``catalog_name``
  #   - ``dqx_service_principal_application_id``
  #   - ``sql_warehouse_id`` (chooses warehouse mode; see DEPLOYMENT.md
  #     "Choosing a SQL warehouse mode" and the live ``bdf-vo`` /
  #     ``kaizen-app`` targets below for worked Mode A / Mode B examples)
  # Everything else has a sensible default in the ``variables:`` block
  # at the top of this file and can be overridden per target below.
  #
  # example-target-mode-a:
  #   workspace:
  #     profile: <your-profile>
  #   variables:
  #     catalog_name: <your-catalog>
  #     dqx_service_principal_application_id: <your-sp-application-id>
  #     sql_warehouse_id: ${resources.sql_warehouses.dqx_sql_warehouse.id}
  #     # Optional overrides:
  #     # admin_group: <your-admin-group>
  #     # app_name: <your-app-name>
  #     # sql_warehouse_name: <your-sql-warehouse-name>   # Mode A only
  #     # schema_name: <your-schema-name>
  #     # tmp_schema_name: <your-tmp-schema-name>
  #     # wheels_volume_name: <your-volume-name>
  #     # lakebase_instance_name: <your-lakebase-instance>
  #     # lakebase_database_name: <your-lakebase-db>
  #     # lakebase_capacity: CU_1 | CU_2 | CU_4 | CU_8
  #   resources:
  #     sql_warehouses:
  #       dqx_sql_warehouse:
  #         name: ${var.sql_warehouse_name}
  #         cluster_size: "X-Small"
  #         enable_serverless_compute: true
  #         max_num_clusters: 1
  #         min_num_clusters: 1
  #         auto_stop_mins: 10
  #         permissions:
  #           - group_name: "users"
  #             level: "CAN_USE"
  #
  cjp-qa-mode-b:
    workspace:
      profile: CJPQA-APP
    variables:
      catalog_name: uc_cjp_qa
      dqx_service_principal_application_id: "818ab164-e764-4bd0-bf5d-2e7726a92fe5"
      sql_warehouse_id: "13df5a7f4c61072a"   # just the ID
      task_runner_job_id: "942769312384991"
      schema_name: "dqx_app"
      tmp_schema_name: "dqx_app_tmp"
      app_name: "dqx-app"
      admin_group: "admins"
      wheels_volume_name: "wheels"
    resources:
      apps:
        dqx-studio:
          # The app's ``resources`` list is wholesale-replaced on target
          # override, so all three entries (warehouse, job, lakebase) must
          # be repeated even though only the warehouse changes.
          resources:
            - name: "dqx-sql-warehouse"
              description: "Shared workspace SQL warehouse (not bundle-managed)"
              sql_warehouse:
                id: ${var.sql_warehouse_id}
                permission: "CAN_USE"
            - name: "dqx-task-runner-job"
              job:
                id: ${resources.jobs.dqx_task_runner.id}
                permission: "CAN_MANAGE"

  eid-ro-mode-b:
    workspace:
      profile: EIDRO-APP
    variables:
      catalog_name: uc_eid_sandbox_prod
      dqx_service_principal_application_id: ""
      sql_warehouse_id: "cd5e118a673141a1" 
      schema_name: "dqx_studio_app"
      tmp_schema_name: "dqx_studio_app_tmp"
      app_name: "dqx-studio-app"
      admin_group: "admins"
      wheels_volume_name: "wheels"
      task_runner_job_id: ""
      app_lakebase_instance_name: ""
      app_lakebase_database_name: ""
    resources:
      apps:
        dqx-studio:
          # The app's ``resources`` list is wholesale-replaced on target
          # override, so all three entries (warehouse, job, lakebase) must
          # be repeated even though only the warehouse changes.
          # Lakebase is disabled for this target (runs on Delta), so omit
          # the dqx-lakebase entry.
          resources:
            - name: "dqx-sql-warehouse"
              description: "Shared workspace SQL warehouse (not bundle-managed)"
              sql_warehouse:
                id: ${var.sql_warehouse_id}
                permission: "CAN_USE"
            - name: "dqx-task-runner-job"
              job:
                id: ${resources.jobs.dqx_task_runner.id}
                permission: "CAN_MANAGE"

    # No resources.sql_warehouses block. post_deploy_grants.sh grants
    # CAN_USE to app SP / job SP / users via the warehouses API.


  # Mode B: reuses the pre-existing ``dqx-studio-sql-warehouse``
  # (X-Small serverless) and the pre-existing
  # ``dqx-studio-lakebase-v2`` instance that an earlier deploy created in
  # this workspace. Point at them by ID/name instead of having the bundle
  # create new copies, so this target is a straight redeploy on top of the
  # existing demo state. ``post_deploy_grants.sh`` handles ``CAN_USE`` on the
  # external warehouse via the warehouses permissions API.
