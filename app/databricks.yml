bundle:
  name: "dqx-studio"

# Per-workspace deploy targets (profile, catalog, service-principal id) live in an
# untracked ``target.*.yml`` so those values are never committed. Copy
# ``target.dev.yml.example`` → ``target.dev.yml`` and fill it in.
include:
  - "target.*.yml"

variables:
  catalog_name:
    description: "Catalog for DQX Studio storage"
    default: "dqx"
  schema_name:
    description: "Main schema for DQX Studio storage"
    default: "dqx_studio"
  tmp_schema_name:
    description: "Temp schema for per-user dry-run views"
    default: "dqx_studio_tmp"
  admin_group:
    description: "Workspace group bootstrapped with the Admin role"
    default: "admins"
  app_name:
    description: "Databricks App name (unique per workspace)"
    default: "dqx-studio"
  sql_warehouse_name:
    description: "Name of the bundle-managed SQL warehouse the app queries through."
    default: "dqx-studio-sql-warehouse"
  sql_warehouse_size:
    description: "Cluster size of the bundle-managed SQL warehouse (e.g. 2X-Small / Small / Medium)."
    default: "Small"
  wheels_volume_name:
    description: "UC volume for DQX wheel files"
    default: "wheels"
  dqx_service_principal_application_id:
    description: "Application ID of the service principal that runs the task-runner job"
    default: "00000000-0000-0000-0000-000000000000"
  # Lakebase backend holds OLTP state (rules, settings, RBAC, comments, schedules,
  # scheduler bookkeeping). Append-mostly observability tables (validation runs,
  # profiling, metrics, quarantine) stay in Delta. Lakebase is provisioned natively
  # as a Postgres *project* (autoscaling, scale-to-zero) whose default branch +
  # 'primary' endpoint are auto-created on first deploy. The app connects to the
  # always-present ``databricks_postgres`` admin DB and isolates per-app via a
  # dedicated Postgres schema (``DQX_LAKEBASE_SCHEMA``, default ``dqx_studio``),
  # which avoids needing CREATE CATALOG on the metastore. See DEPLOYMENT.md.
  lakebase_project_id:
    description: "Lakebase Postgres project id (also its resource-name component)."
    default: "dqx-studio-db"
  lakebase_branch:
    description: >
      Lakebase project branch the app uses. The project auto-creates this branch
      (with a 'primary' read/write endpoint) on first deploy. Injected into
      ``default_branch``, ``lakebase_endpoint``, and the app SP's Postgres role
      ``parent`` so the whole wiring tracks one name.
    default: "dqx"
  lakebase_endpoint:
    description: >
      Lakebase endpoint resource path the app connects to (DQX_LAKEBASE_ENDPOINT).
      Derived from the project + branch; drives BOTH host resolution
      (``postgres.get_endpoint``) and OAuth credential issuance
      (``postgres.generate_database_credential``). Set to a sentinel (``-``) and
      drop the postgres_projects/postgres_roles blocks to run OLTP on Delta instead.
    default: "projects/${var.lakebase_project_id}/branches/${var.lakebase_branch}/endpoints/primary"
  lakebase_database_name:
    description: "Postgres database the app connects to inside the Lakebase project."
    default: "databricks_postgres"
  lakebase_min_cu:
    description: "Lakebase endpoint min compute units (floor 0.5; cannot be 0)."
    default: 0.5
  lakebase_max_cu:
    description: "Lakebase endpoint max compute units (>= min)."
    default: 1
  lakebase_suspend_timeout:
    description: >
      Idle duration after which the Lakebase endpoint scales to zero (suspends).
      Must be 60s–604800s. This is the scale-to-zero control; when the endpoint is
      suspended the app's connection pool discards dead connections and transparently
      reconnects on the next request (pre-ping), which resumes the endpoint. See
      backend/pg_executor.py.
    default: "300s"
  app_config:
    type: complex
    description: "Databricks Apps config block"
    default:
      # Single worker so the in-process SchedulerService (gated by a file lock)
      # doesn't fight itself across workers. The in-memory CacheFactory is per
      # worker (TTL, non-authoritative) so adding workers is otherwise safe.
      # Plain ``uvicorn`` (NOT ``uv run``): the platform ``[BUILD]`` phase has
      # already pip-installed the fully-pinned ``.build/requirements.txt`` into
      # the app venv, so there is NO dependency resolution at container start
      # (the container's egress to the internal package proxies is unreliable).
      command:
        - "uvicorn"
        - "databricks_labs_dqx_app.backend.app:app"
        - "--workers"
        - "1"
      env:
        - name: "DATABRICKS_WAREHOUSE_ID"
          value_from: "dqx-sql-warehouse"
        - name: "DQX_CATALOG"
          value: "${var.catalog_name}"
        - name: "DQX_SCHEMA"
          value: "${var.schema_name}"
        - name: "DQX_JOB_ID"
          value_from: "dqx-task-runner-job"
        - name: "DQX_REQUIRE_TASK_RUNNER"
          value: "1"
        - name: "DQX_TMP_SCHEMA"
          value: "${var.tmp_schema_name}"
        - name: "DQX_ADMIN_GROUP"
          value: "${var.admin_group}"
        - name: "DQX_WHEELS_VOLUME"
          value: "/Volumes/${var.catalog_name}/${var.schema_name}/${var.wheels_volume_name}"
        - name: "DQX_LAKEBASE_ENDPOINT"
          value: "${var.lakebase_endpoint}"
        - name: "DQX_LAKEBASE_DATABASE_NAME"
          value: "${var.lakebase_database_name}"
        # Starter Insights dashboard; admins can override at runtime via Configuration.
        - name: "DQX_DEFAULT_DASHBOARD_ID"
          value: "${resources.dashboards.dqx_quality_overview.id}"

sync:
  include:
    - .build

artifacts:
  default:
    # build_app.py produces, under .build/: the application wheel, the
    # vendored local DQX library wheel (.build/wheels/ — the Rules Registry
    # integration imports symbols absent from the published release, so the
    # app must ship the local library build), the (unpublished) task-runner
    # wheel (.build/tasks/), and a requirements.txt whose first two lines
    # reference those local wheels followed by the fully-pinned transitive
    # closure exported from app/uv.lock. The Apps [BUILD] phase pip-installs
    # requirements.txt and the app starts with plain uvicorn (no runtime
    # dependency resolution — see var.app_config.command).
    build: uv run python scripts/build_app.py

resources:
  apps:
    dqx-studio:
      name: ${var.app_name}
      description: "Databricks DQX Studio for Data Quality Monitoring"
      source_code_path: ".build"
      config: ${var.app_config}

      user_api_scopes:
        - sql
        - catalog.catalogs:read
        - catalog.schemas:read
        - catalog.tables:read
        - serving.serving-endpoints
        # Ask Genie chat runs on-behalf-of the signed-in user (P4.2), so the
        # OBO token must carry the Genie API scope. The chat service keeps
        # its SP fallback regardless — harmless once OBO works, and it
        # protects workspaces whose OAuth integration strips scopes.
        - dashboards.genie
        # NOTE: there is no valid Databricks Apps user-API scope for listing
        # all-purpose clusters — the bundle API rejects `clusters` with a 400
        # (INVALID_PARAMETER_VALUE), which failed the whole app-resource update.
        # So the admin Compute section's cluster picker degrades to an empty
        # list (ComputeService.list_clusters returns [] on the OBO
        # PermissionDenied); do not re-add a `clusters` scope here (B2-105).

      resources:
        # Binding the bundle-managed warehouse to the app grants the app SP CAN_USE.
        - name: "dqx-sql-warehouse"
          description: "SQL Warehouse for DQX Studio queries"
          sql_warehouse:
            id: ${resources.sql_warehouses.dqx_sql_warehouse.id}
            permission: "CAN_USE"
        - name: "dqx-task-runner-job"
          description: "Job for async profiler and dry-run tasks"
          job:
            id: ${resources.jobs.dqx_task_runner.id}
            permission: "CAN_MANAGE"
        # No ``database:`` binding — the app connects via DQX_LAKEBASE_ENDPOINT and
        # gets connect/create rights from postgres_roles.app_sp (below).

      # Workspace-scoped ACL: use the workspace-local ``users`` group (the
      # account-level ``account users`` group isn't resolvable by the app
      # permissions API in workspaces where it isn't synced).
      permissions:
        - group_name: "users"
          level: "CAN_USE"

  # Bundle-managed SQL warehouse. The app queries it (app SP via the binding above)
  # and end-user OBO dry-run/preview queries run through it, so ``users`` needs CAN_USE.
  sql_warehouses:
    dqx_sql_warehouse:
      name: ${var.sql_warehouse_name}
      cluster_size: ${var.sql_warehouse_size}
      max_num_clusters: 1
      auto_stop_mins: 30
      enable_serverless_compute: true
      warehouse_type: PRO
      tags:
        custom_tags:
          - key: app
            value: "dqx-studio"
      # List the app SP explicitly: with ``permissions`` set, the app's warehouse
      # binding would otherwise override them and drop its access. Use workspace
      # ``users`` — the warehouse permissions API can't resolve account-level
      # ``account users`` (UC ``grants`` below can).
      permissions:
        - level: CAN_USE
          service_principal_name: ${resources.apps.dqx-studio.service_principal_client_id}
        - level: CAN_USE
          group_name: "users"

  # Stateful storage. ``lifecycle.prevent_destroy: true`` makes ``bundle destroy``
  # (or a replacing deploy) fail fast instead of dropping data; to tear down, drop
  # the flag, ``bundle deployment unbind <key>``, then destroy.
  # Grants are native. USE CATALOG on the pre-existing catalog can't be granted here
  # (the bundle doesn't manage the catalog) — grant it once per catalog (see DEPLOYMENT.md).
  schemas:
    main_schema:
      catalog_name: ${var.catalog_name}
      name: ${var.schema_name}
      comment: "DQX Studio main schema (rules, run history, profiling, metrics, quarantine, OLTP fallback)"
      grants:
        - principal: ${resources.apps.dqx-studio.service_principal_client_id}
          privileges:
            - ALL_PRIVILEGES
        - principal: ${var.dqx_service_principal_application_id}
          privileges:
            - ALL_PRIVILEGES
        # The starter Insights dashboard embeds the deployer's credentials, so the
        # deployer needs SELECT on the DQX tables (created by the app SP, not the
        # deployer). Schema-level SELECT covers current + future tables.
        - principal: ${workspace.current_user.userName}
          privileges:
            - USE_SCHEMA
            - SELECT
      lifecycle:
        prevent_destroy: true
    tmp_schema:
      catalog_name: ${var.catalog_name}
      name: ${var.tmp_schema_name}
      comment: "DQX Studio temp schema for per-user dry-run views"
      grants:
        - principal: ${resources.apps.dqx-studio.service_principal_client_id}
          privileges:
            - ALL_PRIVILEGES
        - principal: ${var.dqx_service_principal_application_id}
          privileges:
            - ALL_PRIVILEGES
        # End users create temp views here via their OBO token during dry-run /
        # preview, so they need USE SCHEMA + CREATE TABLE.
        - principal: "account users"
          privileges:
            - USE_SCHEMA
            - CREATE_TABLE
      lifecycle:
        prevent_destroy: true
    demo_schema:
      # Home for the "Deploy demo content" seeded source tables (customers,
      # orders, payments, products, shipments). Declared as a bundle resource so
      # `bundle deploy` creates it owned by the app SP with ALL_PRIVILEGES — the
      # app SP lacks catalog-level CREATE SCHEMA on the user catalog, so the
      # seeder's `CREATE SCHEMA IF NOT EXISTS` is a no-op inside a schema it
      # already fully owns. Kept separate from the app's own dqx_studio schema so
      # a demo re-seed never touches app state.
      catalog_name: ${var.catalog_name}
      name: dqx_studio_demo
      comment: "DQX Studio demo content source tables (seeded e-commerce data)"
      grants:
        - principal: ${resources.apps.dqx-studio.service_principal_client_id}
          privileges:
            - ALL_PRIVILEGES
        - principal: ${var.dqx_service_principal_application_id}
          privileges:
            - ALL_PRIVILEGES
        # End users browse/preview the demo source tables via OBO, so they need
        # read access (the demo is meant to be explored).
        - principal: "account users"
          privileges:
            - USE_SCHEMA
            - SELECT
      lifecycle:
        prevent_destroy: true

  volumes:
    wheels:
      catalog_name: ${var.catalog_name}
      schema_name: ${resources.schemas.main_schema.name}
      name: ${var.wheels_volume_name}
      volume_type: MANAGED
      comment: "DQX Studio wheel storage for the task runner"
      grants:
        - principal: ${resources.apps.dqx-studio.service_principal_client_id}
          privileges:
            - ALL_PRIVILEGES
        - principal: ${var.dqx_service_principal_application_id}
          privileges:
            - ALL_PRIVILEGES
      lifecycle:
        prevent_destroy: true

  # Lakebase Postgres *project* backing the app's OLTP state. Creating the project
  # auto-provisions its default branch + a 'primary' read/write endpoint, so no
  # branch/endpoint resource is declared here. Scale-to-zero is controlled by
  # ``suspend_timeout_duration`` (see the app's pre-ping wakeup handling in
  # backend/pg_executor.py). To run without Lakebase, remove this block and the
  # postgres_roles block below, then set ``lakebase_endpoint: "-"`` (OLTP falls
  # back to Delta via the MigrationRunner path).
  postgres_projects:
    dqx_studio:
      project_id: ${var.lakebase_project_id}
      display_name: "dqx-studio"
      pg_version: 16
      default_branch: "projects/${var.lakebase_project_id}/branches/${var.lakebase_branch}"
      default_endpoint_settings:
        autoscaling_limit_min_cu: ${var.lakebase_min_cu}
        autoscaling_limit_max_cu: ${var.lakebase_max_cu}
        suspend_timeout_duration: ${var.lakebase_suspend_timeout}
      lifecycle:
        prevent_destroy: true

  # Postgres role for the app's service principal, created natively by DABs
  # (CLI >= 1.4.0). ``postgres_role`` is the app SP's client id (UUID) — the app
  # authenticates as that identity (PGUSER = the SP client id resolved at runtime),
  # so the OAuth login matches this role. ``role_id`` (the resource-name component)
  # must start with a letter, so the UUID is prefixed ``sp-``. DATABRICKS_SUPERUSER
  # membership lets the app create its ``dqx_studio`` schema + tables on first
  # connect — the only way to grant object privileges inside Postgres from a
  # bundle. The SP id is interpolated from the app resource, which makes DABs
  # create the app first.
  postgres_roles:
    app_sp:
      parent: "projects/${var.lakebase_project_id}/branches/${var.lakebase_branch}"
      role_id: "sp-${resources.apps.dqx-studio.service_principal_client_id}"
      postgres_role: ${resources.apps.dqx-studio.service_principal_client_id}
      identity_type: SERVICE_PRINCIPAL
      auth_method: LAKEBASE_OAUTH_V1
      attributes:
        createdb: true
        createrole: true
        bypassrls: true
      membership_roles:
        - DATABRICKS_SUPERUSER

  dashboards:
    dqx_quality_overview:
      display_name: "[${bundle.target}] DQX Quality Overview"
      file_path: ./dashboards/dqx_quality_overview.lvdash.json
      warehouse_id: ${resources.sql_warehouses.dqx_sql_warehouse.id}
      dataset_catalog: ${var.catalog_name}
      dataset_schema: ${var.schema_name}
      embed_credentials: true
      # Workspace-scoped ACL — see the app/warehouse permissions note; use the
      # workspace-local ``users`` group, not account-level ``account users``.
      permissions:
        - level: CAN_READ
          group_name: "users"

  jobs:
    dqx_task_runner:
      name: "dqx-studio-task-runner"
      max_concurrent_runs: 10
      tags:
        app: "dqx-studio"
      run_as:
        service_principal_name: ${var.dqx_service_principal_application_id}
      tasks:
        - task_key: "run_task"
          python_wheel_task:
            package_name: databricks_labs_dqx_task_runner
            entry_point: dqx-task-runner
            parameters:
              - "--task_type"
              - "{{job.parameters.task_type}}"
              - "--view_fqn"
              - "{{job.parameters.view_fqn}}"
              - "--result_catalog"
              - "{{job.parameters.result_catalog}}"
              - "--result_schema"
              - "{{job.parameters.result_schema}}"
              - "--config_json"
              - "{{job.parameters.config_json}}"
              - "--run_id"
              - "{{job.parameters.run_id}}"
              - "--requesting_user"
              - "{{job.parameters.requesting_user}}"
              # SQL warehouse the runner uses to drop the temp view it read from
              # (see runner.py view-cleanup path). Threaded from the admin's
              # configured warehouse via JobService.submit_run; "" falls back to
              # spark.sql cleanup on the job compute.
              - "--warehouse_id"
              - "{{job.parameters.warehouse_id}}"
              # ``{{job.run_id}}`` is a built-in run-context reference (not a job
              # parameter) — the Jobs service resolves it per run, so the task
              # runner can stamp job_run_id onto its terminal result row and the
              # Runs-History "Run" column can deep-link to this job run.
              - "--job_run_id"
              - "{{job.run_id}}"
          environment_key: "default"
      environments:
        - environment_key: "default"
          spec:
            client: "5"
            dependencies:
              # Local task-runner wheel (not published) + the locally-built DQX
              # library wheel vendored by build_app.py under .build/wheels/. The
              # app imports Rules Registry symbols absent from the published
              # release, so the task-runner runs the same local library build as
              # the app (satisfies the task-runner wheel's ==0.15.0 dqx pin).
              - ./.build/tasks/databricks_labs_dqx_task_runner-*.whl
              - ./.build/wheels/databricks_labs_dqx-*.whl
      parameters:
        - name: "task_type"
          default: "profile"
        - name: "view_fqn"
          default: ""
        - name: "result_catalog"
          default: "${var.catalog_name}"
        - name: "result_schema"
          default: "${var.schema_name}"
        - name: "config_json"
          default: "{}"
        - name: "run_id"
          default: ""
        - name: "requesting_user"
          default: "unknown"
        - name: "warehouse_id"
          default: ""

# Deploy targets are defined in the untracked ``target.dev.yml`` (see the
# ``include`` above and ``target.dev.yml.example``).
