bundle:
  name: "databricks-labs-dqx-app"

variables:
  catalog_name:
    description: "Name of the catalog for DQX app storage"
    default: "dqx"
  schema_name:
    description: "Name of the schema for DQX app storage"
    default: "dqx_app"
  app_config:
    type: complex
    description: "Configuration for dqx app"
    default:
      command:
        - "uvicorn"
        - "databricks_labs_dqx_app.backend.app:app"
        - "--workers"
        - "2"
      env:
        - name: "DATABRICKS_WAREHOUSE_ID"
          value_from: "dqx-sql-warehouse"
        - name: "DQX_CATALOG"
          value: "${var.catalog_name}"
        - name: "DQX_SCHEMA"
          value: "${var.schema_name}"
        - name: "DQX_JOB_ID"
          value_from: "dqx-task-runner-job"

sync:
  include:
    - .build
    - tasks

artifacts:
  default:
    build: uv run apx build

resources:
  apps:
    databricks-labs-dqx-app:
      name: "databricks-labs-dqx-app"
      description: "Databricks DQX App for Data Quality Monitoring"
      source_code_path: ".build"
      config: ${var.app_config}

      # Below are scopes available today, but they are not enough for the app features to work properly.
      # After deploying the app, you need to enable additional scopes by running:
      # Login: databricks auth login --host https://accounts.cloud.databricks.com --account-id <dbx-account-id> --profile <profile-name>
      # `databricks account custom-app-integration update '<oauth2-app-client-id>' --json '{"scopes": ["openid", "profile", "email", "all-apis", "offline_access", "iam.current-user"]}'`
      # where: <oauth2-app-client-id> is the Oauth2 App Client ID which can be found in the Apps UI under User authorization
      # alternatively, you can find it by running: `databricks account custom-app-integration list`

      # use all-apis scope for full functionality instead of the limited scopes below
      user_api_scopes:
        - sql
        - catalog.catalogs:read
        - catalog.schemas:read
        - catalog.tables:read


      resources:
        - name: "dqx-sql-warehouse"
          description: "SQL Warehouse for DQX app queries"
          sql_warehouse:
            id: ${resources.sql_warehouses.dqx_sql_warehouse.id}
            permission: "CAN_USE"
        - name: "dqx-task-runner-job"
          description: "Job for async profiler and dry-run tasks"
          job:
            id: ${resources.jobs.dqx_task_runner.id}
            permission: "CAN_MANAGE_RUN"

      permissions:
        - user_name: "*"
          level: "CAN_USE"

  sql_warehouses:
    dqx_sql_warehouse:
      name: dqx-sql-warehouse
      cluster_size: "X-Small"
      enable_serverless_compute: true
      max_num_clusters: 1
      min_num_clusters: 1
      auto_stop_mins: 10

  schemas:
    dqx_schema:
      catalog_name: ${var.catalog_name}
      name: ${var.schema_name}

  jobs:
    dqx_task_runner:
      name: "dqx-app-task-runner"
      tags:
        app: "dqx"
      tasks:
        - task_key: "run_task"
          spark_python_task:
            python_file: "./tasks/dqx_task_runner.py"
            parameters:
              - "--task_type"
              - "{{job.parameters.task_type}}"
              - "--view_fqn"
              - "{{job.parameters.view_fqn}}"
              - "--result_catalog"
              - "{{job.parameters.result_catalog}}"
              - "--result_schema"
              - "{{job.parameters.result_schema}}"
              - "--config_json"
              - "{{job.parameters.config_json}}"
              - "--run_id"
              - "{{job.parameters.run_id}}"
              - "--requesting_user"
              - "{{job.parameters.requesting_user}}"
          environment_key: "default"
      environments:
        - environment_key: "default"
          spec:
            client: "1"
            dependencies:
              - "databricks-labs-dqx"
      parameters:
        - name: "task_type"
          default: "profile"
        - name: "view_fqn"
          default: ""
        - name: "result_catalog"
          default: "${var.catalog_name}"
        - name: "result_schema"
          default: "${var.schema_name}"
        - name: "config_json"
          default: "{}"
        - name: "run_id"
          default: ""
        - name: "requesting_user"
          default: "unknown"

targets:
  dev:
    mode: development
    default: true
