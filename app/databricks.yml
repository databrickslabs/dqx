bundle:
  name: "dqx-studio"


variables:
  catalog_name:
    description: "Catalog for DQX Studio storage"
    default: "dqx"
  schema_name:
    description: "Main schema for DQX Studio storage"
    default: "dqx_studio"
  tmp_schema_name:
    description: "Temp schema for per-user dry-run views"
    default: "dqx_studio_tmp"
  admin_group:
    description: "Workspace group bootstrapped with the Admin role"
    default: "admins"
  app_name:
    description: "Databricks App name (unique per workspace)"
    default: "dqx-studio"
  sql_warehouse_name:
    description: "Warehouse name to create when a target opts into a bundle-managed warehouse (Mode A only)."
    default: "dqx-studio-sql-warehouse"
  sql_warehouse_id:
    description: >
      ID of the SQL warehouse the app uses. Every target MUST set this.
      Mode A (bundle-managed): ``${resources.sql_warehouses.dqx_sql_warehouse.id}`` AND
      declare ``sql_warehouses.dqx_sql_warehouse`` locally (illustrative only — no
      in-repo target uses this).
      Mode B (external / reuse): literal warehouse ID, no resource block; CAN_USE is
      granted by ``post_deploy_grants.sh`` (worked example: the ``dqx-app-demo`` target).
      Default is empty so a target that forgets to set it fails fast at deploy time.
      See DEPLOYMENT.md → "Choosing a SQL warehouse mode" for the full comparison.
    default: ""
  wheels_volume_name:
    description: "UC volume for DQX wheel files"
    default: "wheels"
  dqx_service_principal_application_id:
    description: "Application ID of the service principal that runs the task-runner job"
    default: "00000000-0000-0000-0000-000000000000"
  # Lakebase backend holds OLTP state (rules, settings, RBAC, comments, schedules,
  # scheduler bookkeeping). Append-mostly observability tables (validation runs,
  # profiling, metrics, quarantine) stay in Delta. New Lakebase instances autoscale
  # (https://docs.databricks.com/aws/en/oltp/upgrade-to-autoscaling). We connect to
  # the always-present ``databricks_postgres`` admin DB and isolate per-app via a
  # dedicated Postgres schema (``DQX_LAKEBASE_SCHEMA_NAME``, default ``dqx_studio``),
  # which avoids needing CREATE CATALOG on the metastore. See DEPLOYMENT.md.
  lakebase_instance_name:
    description: "Lakebase Postgres instance for OLTP state."
    default: "dqx-studio-lakebase"
  lakebase_database_name:
    description: "Postgres database the app connects to inside the Lakebase instance."
    default: "databricks_postgres"
  lakebase_capacity:
    description: "Lakebase compute capacity (CU_1 / CU_2 / CU_4 / CU_8)"
    default: "CU_1"
  app_config:
    type: complex
    description: "Databricks Apps config block"
    default:
      # Single worker so the in-process SchedulerService (gated by a file lock)
      # doesn't fight itself across workers. The in-memory CacheFactory is per
      # worker (TTL, non-authoritative) so adding workers is otherwise safe.
      command:
        - "uvicorn"
        - "databricks_labs_dqx_app.backend.app:app"
        - "--workers"
        - "1"
      env:
        - name: "DATABRICKS_WAREHOUSE_ID"
          value_from: "dqx-sql-warehouse"
        - name: "DQX_CATALOG"
          value: "${var.catalog_name}"
        - name: "DQX_SCHEMA"
          value: "${var.schema_name}"
        - name: "DQX_JOB_ID"
          value_from: "dqx-task-runner-job"
        - name: "DQX_REQUIRE_TASK_RUNNER"
          value: "1"
        - name: "DQX_TMP_SCHEMA"
          value: "${var.tmp_schema_name}"
        - name: "DQX_ADMIN_GROUP"
          value: "${var.admin_group}"
        - name: "DQX_WHEELS_VOLUME"
          value: "/Volumes/${var.catalog_name}/${var.schema_name}/${var.wheels_volume_name}"
        - name: "DQX_LAKEBASE_INSTANCE_NAME"
          value: "${var.lakebase_instance_name}"
        - name: "DQX_LAKEBASE_DATABASE_NAME"
          value: "${var.lakebase_database_name}"
        # Starter Insights dashboard; admins can override at runtime via Configuration.
        - name: "DQX_DEFAULT_DASHBOARD_ID"
          value: "${resources.dashboards.dqx_quality_overview.id}"

sync:
  include:
    - .build

artifacts:
  default:
    build: >
      uv run python scripts/build_app.py &&
      rm -f .build/databricks_labs_dqx-*.whl &&
      rm -rf .build/tasks &&
      uv build ../ --wheel --out-dir .build/ &&
      uv build tasks/ --wheel --out-dir .build/tasks/ &&
      dqx_whl=$(ls -1t .build/databricks_labs_dqx-*.whl | head -1 | xargs basename) &&
      echo "$dqx_whl" | cat - .build/requirements.txt > .build/requirements.txt.tmp &&
      mv .build/requirements.txt.tmp .build/requirements.txt

resources:
  apps:
    dqx-studio:
      name: ${var.app_name}
      description: "Databricks DQX Studio for Data Quality Monitoring"
      source_code_path: ".build"
      config: ${var.app_config}

      user_api_scopes:
        - sql
        - catalog.catalogs:read
        - catalog.schemas:read
        - catalog.tables:read
        - serving.serving-endpoints

      resources:
        - name: "dqx-sql-warehouse"
          description: "SQL Warehouse for DQX Studio queries"
          sql_warehouse:
            id: ${var.sql_warehouse_id}
            permission: "CAN_USE"
        - name: "dqx-task-runner-job"
          description: "Job for async profiler and dry-run tasks"
          job:
            id: ${resources.jobs.dqx_task_runner.id}
            permission: "CAN_MANAGE"
        # ``database:`` binding (instance + database). ``instance_name`` points
        # at ``resources.database_instances.lakebase``, which the target
        # declares; the base binding resolves it after the per-target merge.
        - name: "dqx-lakebase"
          description: "Lakebase Postgres backend for app OLTP state"
          database:
            database_name: ${var.lakebase_database_name}
            instance_name: ${resources.database_instances.lakebase.name}
            permission: "CAN_CONNECT_AND_CREATE"

      permissions:
        - group_name: "account users"
          level: "CAN_USE"

  # Stateful storage (schemas, volume, Lakebase instance). Every entry below is
  # tagged ``lifecycle.prevent_destroy: true`` so ``bundle destroy`` (or any deploy
  # that would replace the resource) fails fast instead of dropping data. To
  # intentionally tear one down: remove the flag, ``databricks bundle deployment
  # unbind <key>``, then destroy. For pre-existing workspaces whose resources were
  # provisioned out-of-band, run ``make app-bind`` once before the first deploy
  # (see DEPLOYMENT.md → "Migrating an existing workspace").
  schemas:
    main_schema:
      catalog_name: ${var.catalog_name}
      name: ${var.schema_name}
      comment: "DQX Studio main schema (rules, run history, profiling, metrics, quarantine, OLTP fallback)"
      #lifecycle:
      #  prevent_destroy: true
    tmp_schema:
      catalog_name: ${var.catalog_name}
      name: ${var.tmp_schema_name}
      comment: "DQX Studio temp schema for per-user dry-run views"
      #lifecycle:
      #  prevent_destroy: true

  volumes:
    wheels:
      catalog_name: ${var.catalog_name}
      schema_name: ${resources.schemas.main_schema.name}
      name: ${var.wheels_volume_name}
      volume_type: MANAGED
      comment: "DQX Studio wheel storage for the task runner"
      #lifecycle:
      #  prevent_destroy: true

  # Lakebase Postgres instance backing the app's OLTP state. Name/capacity read
  # from variables so a target can resize or rename it. The ``dqx-lakebase`` app
  # binding above references ``${resources.database_instances.lakebase.name}``.
  # To run without Lakebase, remove this block and the ``dqx-lakebase`` binding,
  # then set ``lakebase_instance_name: "-"`` (OLTP falls back to Delta).
  database_instances:
    lakebase:
      name: ${var.lakebase_instance_name}
      capacity: ${var.lakebase_capacity}
      #lifecycle:
      #  prevent_destroy: true

  dashboards:
    dqx_quality_overview:
      display_name: "[${bundle.target}] DQX Quality Overview"
      file_path: ./dashboards/dqx_quality_overview.lvdash.json
      warehouse_id: ${var.sql_warehouse_id}
      dataset_catalog: ${var.catalog_name}
      dataset_schema: ${var.schema_name}
      embed_credentials: true
      permissions:
        - level: CAN_READ
          group_name: "account users"

  jobs:
    dqx_task_runner:
      name: "dqx-studio-task-runner"
      max_concurrent_runs: 10
      tags:
        app: "dqx"
      run_as:
        service_principal_name: ${var.dqx_service_principal_application_id}
      tasks:
        - task_key: "run_task"
          python_wheel_task:
            package_name: databricks_labs_dqx_task_runner
            entry_point: dqx-task-runner
            parameters:
              - "--task_type"
              - "{{job.parameters.task_type}}"
              - "--view_fqn"
              - "{{job.parameters.view_fqn}}"
              - "--result_catalog"
              - "{{job.parameters.result_catalog}}"
              - "--result_schema"
              - "{{job.parameters.result_schema}}"
              - "--config_json"
              - "{{job.parameters.config_json}}"
              - "--run_id"
              - "{{job.parameters.run_id}}"
              - "--requesting_user"
              - "{{job.parameters.requesting_user}}"
          environment_key: "default"
      environments:
        - environment_key: "default"
          spec:
            client: "5"
            dependencies:
              - ./.build/tasks/databricks_labs_dqx_task_runner-*.whl
              - ./.build/databricks_labs_dqx-*.whl
      parameters:
        - name: "task_type"
          default: "profile"
        - name: "view_fqn"
          default: ""
        - name: "result_catalog"
          default: "${var.catalog_name}"
        - name: "result_schema"
          default: "${var.schema_name}"
        - name: "config_json"
          default: "{}"
        - name: "run_id"
          default: ""
        - name: "requesting_user"
          default: "unknown"

# Targets: at minimum each one sets ``catalog_name``,
# ``dqx_service_principal_application_id``, and ``sql_warehouse_id``.
# Every other variable defaults sensibly; override per target as needed.
#
# This bundle ships a SINGLE canonical target, ``dqx-app-demo``. It uses Mode B
# (reuse an existing warehouse): a literal ``sql_warehouse_id`` and no
# ``sql_warehouses`` block. To add a Mode A (bundle-managed warehouse) target
# instead, declare a local ``sql_warehouses.dqx_sql_warehouse`` block and point
# ``sql_warehouse_id`` at ``${resources.sql_warehouses.dqx_sql_warehouse.id}``.
# See DEPLOYMENT.md → "Choosing a SQL warehouse mode" for the full comparison.
#
# To disable Lakebase, remove the ``database_instances.lakebase`` block and the
# ``dqx-lakebase`` app resource binding, then set ``lakebase_instance_name: "-"``
# (OLTP tables fall back to Delta via the ``MigrationRunner`` path).
#
# One-button Postgres: a ``postgres_roles`` block makes the app SP's
# CREATE-schema privilege on ``databricks_postgres`` bundle-managed. It requires
# Databricks CLI >= 1.4.0 and is for FRESH workspaces; ``dqx-app-demo`` omits it
# because its app SP's Postgres role already exists (see the note on the target
# below). The full block is documented in DEPLOYMENT.md.
targets:
  # The single canonical target for this workspace. Marked default so a bare
  # ``bundle deploy`` (no ``-t``) resolves to it.
  dev:
    default: true
    workspace:
      profile: <your-profile>
    variables:
      catalog_name: <your-catalog>
      dqx_service_principal_application_id: <your-service-principal-application-id>
      # Mode B: literal ID of an existing warehouse (bundle never manages it).
      sql_warehouse_id: "<existing-warehouse-id>"
      lakebase_instance_name: <existing-lakebase-instance>
    presets:
      trigger_pause_status: PAUSED
