name: build

on:
  pull_request:
    types: [opened, synchronize]
  merge_group:
    types: [checks_requested]
  push:
    # Always run on push to main. The build cache can only be reused
    # if it was saved by a run from the repository's default branch.
    # The run result will be identical to that from the merge queue
    # because the commit is identical, yet we need to perform it to
    # seed the build cache.
    branches:
      - main

permissions:
  contents: read

jobs:
  not-a-fork:
    runs-on:
      group: databrickslabs-protected-runner-group
      labels: linux-ubuntu-latest
    if: github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork
    steps:
      - run: echo "Not a fork PR, proceeding"

  ci:
    # Fork-gate is applied per-step via `env.IS_FORK_PR` so the matrix expands and each
    # leaf (ci (3.10), ci (3.11), ci (3.12)) reports its own check. A job-level `if:`
    # skips the job before matrix expansion and emits only a single `ci` check, leaving
    # the required `ci (X.Y)` contexts in "Expected — Waiting for status to be reported".
    strategy:
      fail-fast: false
      matrix:
        pyVersion: [ '3.10', '3.11', '3.12' ]
    runs-on:
      group: databrickslabs-protected-runner-group
      labels: linux-ubuntu-latest
    permissions:
      id-token: write
    env:
      UV_PYTHON: ${{ matrix.pyVersion }}
      IS_FORK_PR: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork }}
    steps:
      - name: Checkout
        if: env.IS_FORK_PR != 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup environment
        if: env.IS_FORK_PR != 'true'
        uses: ./.github/actions/setup-env

      - name: Run unit tests
        if: env.IS_FORK_PR != 'true'
        run: make test

      - name: Publish unit test coverage
        # 3.12 only to avoid duplicate uploads.
        # Skip on `push: main` — main-branch coverage is published by nightly.yml which
        # runs the full test set (unit + integration + anomaly + e2e). Publishing only
        # unit coverage here would overwrite codecov's main baseline with a lower number.
        if: env.IS_FORK_PR != 'true' && matrix.pyVersion == '3.12' && github.event_name != 'push'
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4.6.0
        with:
          use_oidc: true
          flags: unit

  fmt:
    needs: not-a-fork
    runs-on:
      group: databrickslabs-protected-runner-group
      labels: linux-ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup environment
        uses: ./.github/actions/setup-env

      - name: Format all files
        run: make dev fmt

      - name: Fail on differences
        run: git diff --exit-code

  docs:
    needs: not-a-fork
    name: Build Docusaurus
    runs-on:
      group: databrickslabs-protected-runner-group
      labels: linux-ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup environment
        uses: ./.github/actions/setup-env

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: docs/dqx/yarn.lock # need to put the lockfile path explicitly

      - name: Install dependencies
        run: make docs-install

      - name: Build website
        run: make docs-build

  app:
    needs: not-a-fork
    name: Build and Check App
    runs-on:
      group: databrickslabs-protected-runner-group
      labels: linux-ubuntu-latest
    permissions:
      id-token: write
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup environment
        uses: ./.github/actions/setup-env

      - name: Install Bun
        uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2.1.3
        with:
          bun-version: "1.3.11"

      - name: Install JavaScript dependencies
        run: npm install

      - name: Build app
        run: uv run apx build

      - name: Run TypeScript and Python checks
        run: uv run apx dev check
