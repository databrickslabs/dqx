bundle:
  name: "mcp-dqx"
  # Deploy without Terraform. The direct engine avoids the `terraform init` provider download
  # from registry.terraform.io (blocked on some networks/CI runners). Requires Databricks CLI
  # 0.279.0+. See https://docs.databricks.com/aws/en/dev-tools/bundles/direct
  engine: direct

variables:
  users_group:
    description: "Group name for all workspace users (e.g. 'account users' or 'users')"
    default: "account users"
  # Resource name prefix. Override (e.g. --var name_prefix=mcp-dqx-ci) to deploy an
  # isolated copy alongside an existing deployment — used by the CI integration workflow.
  name_prefix:
    default: "mcp-dqx"
  # Catalog for temp views + per-user output schemas AND the UC volume that hosts the runner wheels.
  # REQUIRED at deploy time: workspace.artifact_path (below) is built from it and is resolved during
  # `bundle deploy`, so an empty value produces an invalid `/Volumes//tmp/...` path. It is injected
  # into the app as the DQX_CATALOG config env value (no secret scope — a catalog name isn't
  # sensitive). Pass e.g. --var catalog_name=<catalog> (or CATALOG=<catalog> via make mcp-deploy).
  # The placeholder default keeps the bundle syntactically valid but every real deploy must override it.
  catalog_name:
    default: ""
  # Application ID of the **dedicated workspace service principal** the runner job runs as.
  # This is NOT the app's auto-created SP — an app-scoped SP cannot be a job run_as identity,
  # so a separate workspace SP is required (see the "Runner service principal" section of the DQX
  # MCP Server installation docs). The placeholder
  # default keeps the bundle syntactically valid; every real deploy MUST override it, e.g.
  #   databricks bundle deploy --var runner_service_principal_id=<app-id-of-the-runner-sp>
  # The deploying identity needs the "Service Principal: User" role on this SP (admins have it
  # implicitly) or `bundle deploy` fails with "User is not authorized to use this service principal".
  runner_service_principal_id:
    default: "00000000-0000-0000-0000-000000000000"

# Host the runner wheels in a UC volume (not the deployer's personal workspace folder). The
# runner job runs as a least-privilege SP; a UC volume grant (READ VOLUME, applied by setup.py)
# is explicit and volume-wide, so it doesn't depend on workspace-ACL inheritance from someone's
# home directory. The volume MUST already exist before `bundle deploy` uploads artifacts into it
# — scripts/ensure_artifacts_volume.sh (run by ci_deploy.sh and `make mcp-deploy`) creates it.
workspace:
  artifact_path: "/Volumes/${var.catalog_name}/tmp/dqx_artifacts"

resources:
  jobs:
    dqx_runner:
      name: "${var.name_prefix}-runner"
      max_concurrent_runs: 10
      # Run the per-request data job as a dedicated, least-privilege workspace SP — NOT the
      # deploying user. Otherwise every caller's job would execute with the deployer's (often
      # admin) permissions on the non-view paths (file reads, output writes). Source-table reads
      # stay governed by the caller via definer's-rights views regardless of this identity.
      run_as:
        service_principal_name: ${var.runner_service_principal_id}
      tasks:
        # A python_wheel_task (not a notebook_task): the job runs as the dedicated runner SP, and
        # the runner is a proper unit-testable package (mirrors the DQX Studio task runner). The
        # run_as SP still needs read access to the wheel — it lives in the dqx_artifacts UC volume
        # (workspace.artifact_path above) and the setup job grants the SP READ VOLUME there (see
        # notebooks/setup.py). The entry point writes its JSON result to the results UC volume
        # keyed by {{job.run_id}}; the app reads it back.
        - task_key: dqx_run
          python_wheel_task:
            package_name: dqx_mcp_runner
            entry_point: dqx-mcp-runner
            parameters:
              - "--operation"
              - "{{job.parameters.operation}}"
              - "--params"
              - "{{job.parameters.params}}"
              - "--results-volume"
              - "{{job.parameters.results_volume}}"
              - "--run-id"
              - "{{job.run_id}}"
          environment_key: default
      environments:
        - environment_key: default
          spec:
            environment_version: "2"
            dependencies:
              # The runner wheel (this sub-project) + the DQX library wheel built from THIS repo
              # (see artifacts), not a published PyPI release, so the runner exercises in-repo
              # (possibly unreleased) source. The [datacontract] extra's dependency is listed
              # explicitly because pip extras can't be applied to a wheel path.
              #
              # The [llm] extra (dspy) is intentionally NOT installed — the runner stays lean and
              # deterministic, mirroring the DQX Studio task runner. As a result the
              # generate_rules_from_contract tool is deterministic-only: it does not process the
              # contract's free-text expectations (DQX's LLM "text rules" path). Enabling that is a
              # follow-up: add the dspy/litellm deps from the DQX [llm] extra here, plumb an LLM
              # endpoint config through to the runner, and re-expose the parameter in server/tools.py.
              - ./.build/dqx_mcp_runner-*.whl
              - ./.build/databricks_labs_dqx-*.whl
              - datacontract-cli>=0.11.1,<1.0
      parameters:
        - name: operation
          default: ""
        - name: params
          default: "{}"
        # Full UC-volume path for result files, e.g. /Volumes/<catalog>/tmp/mcp_results. The app
        # sets this per-submit from its catalog config; the runner writes <run_id>.json there.
        - name: results_volume
          default: ""
        # Email of the user who submitted this run (from the OBO X-Forwarded-Email header). Not read
        # by the runner — it's recorded on the run so get_run_result can authorize the reader: only
        # the submitter may fetch a run's result (results can contain their governed source data).
        - name: requesting_user
          default: ""

    # One-time setup job — grants USE CATALOG to users and app SP.
    # Run after first deploy: databricks bundle run dqx_setup --profile <profile>
    dqx_setup:
      name: "${var.name_prefix}-setup"
      tasks:
        - task_key: setup
          notebook_task:
            notebook_path: "./notebooks/setup.py"
            base_parameters:
              app_name: "${var.name_prefix}"
              catalog_name: "${var.catalog_name}"
              users_group: ${var.users_group}
              # The runner job's run_as SP — setup grants it the tmp-schema access it needs.
              runner_service_principal_id: "${var.runner_service_principal_id}"
              # The runner job id — setup grants the app SP CAN_MANAGE_RUN on it so the app can
              # submit runs and poll results. (The app→job resource binding alone did not reliably
              # land this grant in the job ACL, so setup applies it explicitly.)
              runner_job_id: "${resources.jobs.dqx_runner.id}"
          environment_key: default
      environments:
        - environment_key: default
          spec:
            environment_version: "2"

  apps:
    mcp-dqx:
      name: "${var.name_prefix}"
      description: "DQX MCP Server - AI agent tools for data quality checks"
      source_code_path: "."

      user_api_scopes:
        - sql
        - files
        # 'workspace.workspace' lets the user's OBO token read/stat/write workspace-file paths
        # (e.g. a contract or checks YAML under /Workspace or /Users). Without it the OBO
        # read/write pre-checks for workspace-file backends fail with 403 "Invalid scope".
        - workspace.workspace

      # App runtime config lives here (not a static app.yaml) so bundle variables interpolate into
      # it at deploy time — mirrors the DQX Studio bundle. This replaces app.yaml (which cannot
      # reference ${var.*}).
      config:
        command: ["python", "server/main.py"]
        env:
          # DQX_CATALOG is a plain (non-secret) value: a Unity Catalog *name* is not sensitive —
          # access is governed by UC grants, not by hiding the name — so it does not belong in a
          # secret scope. It is set at deploy time from the catalog_name bundle var (the same value
          # used for the artifacts-volume path), so there is nothing to configure out-of-band.
          - name: DQX_CATALOG
            value: "${var.catalog_name}"
          - name: DQX_TMP_SCHEMA
            value: "tmp"
          # Resource-backed: the runner job id comes from the app→job binding below.
          - name: DQX_RUNNER_JOB_ID
            value_from: "dqx-runner-job"

      resources:
        - name: dqx-runner-job
          job:
            id: ${resources.jobs.dqx_runner.id}
            permission: "CAN_MANAGE_RUN"

      permissions:
        - level: CAN_USE
          group_name: ${var.users_group}

sync:
  include:
    - "notebooks/**"
    - ".build/**"

# Build the wheels the runner job installs from THIS branch's source (not published PyPI releases):
# the DQX library wheel (from the repo root) and the MCP runner wheel (this sub-project's ./runner).
# Mirrors the app/ bundle, which also builds the parent wheel via `uv build ../ --wheel`.
artifacts:
  dqx_library_wheel:
    build: uv build ../ --wheel --out-dir ./.build
  dqx_mcp_runner_wheel:
    build: uv build ./runner --wheel --out-dir ./.build

targets:
  dev:
    default: true
