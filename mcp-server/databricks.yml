bundle:
  name: "mcp-dqx"
  # Deploy without Terraform. The direct engine avoids the `terraform init` provider download
  # from registry.terraform.io (blocked on some networks/CI runners). Requires Databricks CLI
  # 0.279.0+. See https://docs.databricks.com/aws/en/dev-tools/bundles/direct
  engine: direct

variables:
  users_group:
    description: "Group name for all workspace users (e.g. 'account users' or 'users')"
    default: "account users"
  # Resource name prefix. Override (e.g. --var name_prefix=mcp-dqx-ci) to deploy an
  # isolated copy alongside an existing deployment — used by the CI integration workflow.
  name_prefix:
    default: "mcp-dqx"
  # Catalog for temp views. Empty => the setup job reads it from the secret scope (the
  # default production behaviour). CI passes an explicit catalog it can create/drop in.
  catalog_name:
    default: ""
  # Secret scope holding the catalog name (and any other config). Override per deployment.
  config_secret_scope:
    default: "dqx-config"
resources:
  jobs:
    dqx_runner:
      name: "${var.name_prefix}-runner"
      max_concurrent_runs: 10
      tasks:
        - task_key: dqx_run
          notebook_task:
            notebook_path: "./notebooks/runner.py"
          environment_key: default
      environments:
        - environment_key: default
          spec:
            environment_version: "2"
            dependencies:
              # Install the DQX library wheel built from THIS repo (see artifacts.dqx_library_wheel),
              # not a published PyPI release, so the runner exercises in-repo (possibly unreleased)
              # source and never drifts from what the PR actually changes. The [datacontract] extra's
              # dependency is listed explicitly because pip extras can't be applied to a wheel path.
              - ./.build/databricks_labs_dqx-*.whl
              - datacontract-cli>=0.11.1,<1.0

    # One-time setup job — grants USE CATALOG to users and app SP.
    # Run after first deploy: databricks bundle run dqx_setup --profile <profile>
    dqx_setup:
      name: "${var.name_prefix}-setup"
      tasks:
        - task_key: setup
          notebook_task:
            notebook_path: "./notebooks/setup.py"
            base_parameters:
              app_name: "${var.name_prefix}"
              catalog_name: "${var.catalog_name}"
              secret_scope: "${var.config_secret_scope}"
              users_group: ${var.users_group}
          environment_key: default
      environments:
        - environment_key: default
          spec:
            environment_version: "2"

  apps:
    mcp-dqx:
      name: "${var.name_prefix}"
      description: "DQX MCP Server - AI agent tools for data quality checks"
      source_code_path: "."

      user_api_scopes:
        - sql
        - files

      resources:
        - name: dqx-runner-job
          job:
            id: ${resources.jobs.dqx_runner.id}
            permission: "CAN_MANAGE_RUN"
        - name: dqx-catalog-secret
          secret:
            scope: ${var.config_secret_scope}
            key: catalog_name
            permission: "READ"

      permissions:
        - level: CAN_USE
          group_name: ${var.users_group}

sync:
  include:
    - "notebooks/**"
    - ".build/**"

# Build the DQX library wheel from the repo root (../) so the runner job installs
# this branch's source rather than a published PyPI release. Mirrors the app/ bundle,
# which also builds the parent wheel via `uv build ../ --wheel`.
artifacts:
  dqx_library_wheel:
    build: uv build ../ --wheel --out-dir ./.build

targets:
  dev:
    default: true
