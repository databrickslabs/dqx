bundle:
  name: "mcp-dqx"

resources:
  apps:
    mcp-dqx:
      name: "mcp-dqx"
      description: "DQX MCP Server - AI agent tools for data quality checks"
      source_code_path: "."

      # OBO: request user token scopes so API calls run as the user
      user_api_scopes:
        - sql
        - files.files

      permissions:
        - level: CAN_USE
          group_name: users

targets:
  dev:
    default: true
