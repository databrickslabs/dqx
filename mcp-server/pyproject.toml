[project]
name = "dqx-mcp-server"
version = "0.1.0"
description = "DQX MCP Server - AI agent tools for data quality checks"
requires-python = ">=3.11"
dependencies = [
    "mcp>=1.0",
    "databricks-labs-dqx",
    "databricks-sdk~=0.73",
    "databricks-connect~=15.4",
]

[project.scripts]
dqx-mcp-server = "dqx_mcp_server.server:main"

# For local development, uncomment the following to use the local DQX source:
# [tool.uv.sources]
# databricks-labs-dqx = { path = "../", editable = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/dqx_mcp_server"]
